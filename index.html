  <style>
html,body{margin:0;padding:0;height:100%;overflow:hidden}
*{box-sizing:border-box}

.hero-bg{
  position:fixed;inset:0;
  background:#05080f;
  overflow:hidden;
}

/* Animated prismatic refraction lines */
.prism-line{
  position:absolute;
  height:1px;
  opacity:.35;
  transform-origin:left center;
  animation:prismShoot 8s linear infinite;
}
@keyframes prismShoot{
  0%{transform:scaleX(0);opacity:0}
  10%{opacity:.5}
  50%{transform:scaleX(1);opacity:.35}
  100%{transform:scaleX(1.2);opacity:0}
}

/* Hexagonal grid pattern */
.hex-grid{
  position:absolute;inset:0;
  background-image:
    linear-gradient(30deg, rgba(0,220,255,.04) 12%, transparent 12.5%, transparent 87%, rgba(0,220,255,.04) 87.5%),
    linear-gradient(150deg, rgba(0,220,255,.04) 12%, transparent 12.5%, transparent 87%, rgba(0,220,255,.04) 87.5%),
    linear-gradient(30deg, rgba(0,220,255,.04) 12%, transparent 12.5%, transparent 87%, rgba(0,220,255,.04) 87.5%),
    linear-gradient(150deg, rgba(0,220,255,.04) 12%, transparent 12.5%, transparent 87%, rgba(0,220,255,.04) 87.5%);
  background-size:80px 140px;
  background-position:0 0,0 0,40px 70px,40px 70px;
}

/* Floating molecular nodes */
.mol-node{
  position:absolute;
  border-radius:50%;
  animation:floatNode 12s ease-in-out infinite alternate;
}
@keyframes floatNode{
  0%{transform:translate(0,0) scale(1)}
  33%{transform:translate(15px,-20px) scale(1.1)}
  66%{transform:translate(-10px,15px) scale(.95)}
  100%{transform:translate(5px,-8px) scale(1.05)}
}

/* Central optic glow */
.optic-core{
  position:absolute;
  width:420px;height:420px;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  border-radius:50%;
  background:radial-gradient(circle, rgba(0,180,255,.12) 0%, rgba(120,0,255,.06) 40%, transparent 70%);
  animation:coreBreath 6s ease-in-out infinite;
}
@keyframes coreBreath{
  0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.8}
  50%{transform:translate(-50%,-50%) scale(1.15);opacity:1}
}

/* Spectral ring */
.spectral-ring{
  position:absolute;
  width:500px;height:500px;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  border-radius:50%;
  border:1px solid rgba(0,200,255,.08);
  animation:ringRotate 30s linear infinite;
}
@keyframes ringRotate{
  to{transform:translate(-50%,-50%) rotate(360deg)}
}
.spectral-ring::before{
  content:'';position:absolute;
  width:8px;height:8px;border-radius:50%;
  background:rgba(0,220,255,.6);
  top:-4px;left:50%;
  box-shadow:0 0 15px rgba(0,220,255,.8);
}

/* Card styling */
.tech-card{
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.06);
  backdrop-filter:blur(10px);
  border-radius:16px;
  padding:28px 24px;
  transition:all .4s cubic-bezier(.25,.8,.25,1);
  position:relative;
  overflow:hidden;
}
.tech-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--card-accent),transparent);
  opacity:0;transition:opacity .4s;
}
.tech-card:hover{
  background:rgba(255,255,255,.06);
  border-color:rgba(255,255,255,.12);
  transform:translateY(-4px);
  box-shadow:0 20px 60px rgba(0,150,255,.08);
}
.tech-card:hover::before{opacity:1}

/* Text shimmer for company name */
.text-shimmer{
  background:linear-gradient(135deg,#00d4ff,#7b61ff,#00d4ff,#7b61ff);
  background-size:300% 300%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:shimmer 6s ease infinite;
}
@keyframes shimmer{
  0%,100%{background-position:0% 50%}
  50%{background-position:100% 50%}
}

.fade-in{opacity:0;transform:translateY(20px);animation:fadeUp .8s ease forwards}
@keyframes fadeUp{to{opacity:1;transform:translateY(0)}}
</style>

    <h1 id="companyName" class="text-shimmer font-black tracking-wider mb-4" style="font-family:'Orbitron',sans-serif;font-size:42px">晶禹科技</h1>
    <p id="tagline" class="font-light tracking-widest" style="font-family:'Noto Sans TC',sans-serif;color:rgba(180,210,240,.7);font-size:15px;letter-spacing:.25em">光學與高分子塗料技術領導者</p>
   </div>
   <div class="max-w-2xl w-full px-8 fade-in text-center" style="animation-delay:.5s">
    <p id="coreDescription" style="font-family:'Noto Sans TC',sans-serif;color:rgba(180,210,240,.7);font-size:15px;line-height:2;letter-spacing:.05em">晶禹科技專注於光學及高分子材料領域的深度研發，整合精密光學薄膜、先進鍍膜技術與高性能高分子塗料，為產業提供創新解決方案。</p>
   </div>

  <script>
lucide.createIcons();

const defaultConfig = {
  company_name: '晶禹科技',
  tagline: '光學與高分子塗料技術領導者',
  core_description: '晶禹科技專注於光學設計開發及高性能高分子材料研發，涵蓋高階塗料應用、散熱系統塗料等領域，整合光學與材料科學，為產業提供先進的材料解決方案。',
  background_color: '#05080f',
  surface_color: '#0d1420',
  text_color: '#e8f0fe',
  primary_color: '#00d4ff',
  secondary_color: '#7b61ff',
  font_family: 'Noto Sans TC',
  font_size: 16
};

function applyConfig(c) {
  document.getElementById('companyName').textContent = c.company_name || defaultConfig.company_name;
  document.getElementById('tagline').textContent = c.tagline || defaultConfig.tagline;
  document.getElementById('coreDescription').textContent = c.core_description || defaultConfig.core_description;

  const ff = c.font_family || defaultConfig.font_family;
  const stack = `${ff}, 'Noto Sans TC', sans-serif`;
  document.querySelectorAll('h2, p, #tagline, #coreDescription').forEach(el => el.style.fontFamily = stack);
  document.getElementById('companyName').style.fontFamily = `'Orbitron', ${stack}`;

  const base = c.font_size || defaultConfig.font_size;
  document.getElementById('companyName').style.fontSize = `${base * 2.6}px`;
  document.getElementById('tagline').style.fontSize = `${base * 0.94}px`;
  document.getElementById('coreDescription').style.fontSize = `${base * 0.94}px`;

  const bg = c.background_color || defaultConfig.background_color;
  document.getElementById('bg').style.background = bg;

  const txt = c.text_color || defaultConfig.text_color;
  document.querySelectorAll('.tech-card h2').forEach(el => el.style.color = txt);

  const pri = c.primary_color || defaultConfig.primary_color;
  const sec = c.secondary_color || defaultConfig.secondary_color;
  document.getElementById('companyName').style.backgroundImage = `linear-gradient(135deg,${pri},${sec},${pri},${sec})`;
}

window.elementSdk.init({
  defaultConfig,
  onConfigChange: async (config) => applyConfig(config),
  mapToCapabilities: (config) => ({
    recolorables: [
      { get: () => config.background_color || defaultConfig.background_color, set: v => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); }},
      { get: () => config.surface_color || defaultConfig.surface_color, set: v => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); }},
      { get: () => config.text_color || defaultConfig.text_color, set: v => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); }},
      { get: () => config.primary_color || defaultConfig.primary_color, set: v => { config.primary_color = v; window.elementSdk.setConfig({ primary_color: v }); }},
      { get: () => config.secondary_color || defaultConfig.secondary_color, set: v => { config.secondary_color = v; window.elementSdk.setConfig({ secondary_color: v }); }}
    ],
    borderables: [],
    fontEditable: { get: () => config.font_family || defaultConfig.font_family, set: v => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); }},
    fontSizeable: { get: () => config.font_size || defaultConfig.font_size, set: v => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); }}
  }),
  mapToEditPanelValues: (config) => new Map([
    ['company_name', config.company_name || defaultConfig.company_name],
    ['tagline', config.tagline || defaultConfig.tagline],
    ['core_description', config.core_description || defaultConfig.core_description]
  ])
});
</script>
